kind = "web"
previewPath = "/"
title = "Reflexology App"
version = "1.0.0"
id = "artifacts/reflexology"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25777

[services.development]
run = "pnpm --filter @workspace/reflexology run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reflexology", "run", "build" ]
publicDir = "artifacts/reflexology/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25777"
BASE_PATH = "/"
